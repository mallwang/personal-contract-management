name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check (shared)
        run: pnpm --filter @pcm/shared exec tsc --noEmit 2>/dev/null || true

      - name: Type check (backend)
        working-directory: packages/backend
        run: pnpm exec tsc --noEmit

      - name: Type check (frontend)
        working-directory: packages/frontend
        run: pnpm exec tsc --noEmit

      - name: Test (backend)
        run: pnpm --filter @pcm/backend test

      - name: Test (frontend)
        run: pnpm --filter @pcm/frontend test
